name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lifeos_test
          POSTGRES_USER: lifeos
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://lifeos:test@localhost:5432/lifeos_test
        run: |
          cd backend
          pytest tests/ -v

  flutter-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          
      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get
          
      - name: Analyze
        run: |
          cd frontend
          flutter analyze
          
      - name: Test
        run: |
          cd frontend
          flutter test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, flutter-test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: docker-compose build
